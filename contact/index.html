<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">

  <!-- Fonts loaded via @import in /css/tokens.css: Manrope (display) + Public Sans (body) + DM Mono (labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Stylesheets: tokens FIRST (defines custom props), then shared components -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/site.css">

  <title>Contact — Emma Hudelson</title>
  <meta name="description" content="Contact Emma Hudelson for readings, workshops, press inquiries, and event bookings.">
  <link rel="canonical" href="https://emmahudelson.com/contact">

  <style>
    /* ── Contact page ──────────────────────────────────
       Single centered column: page heading + form only.
       ───────────────────────────────────────────────── */
    .contact-body {
      padding-left: var(--page-gutter);
      padding-right: var(--page-gutter);
      max-width: var(--measure);
      margin: 0 auto;
      padding-bottom: var(--s-9);
    }

    .contact-form {
      margin: 0;
    }
    .contact-form .field:last-of-type {
      margin-bottom: var(--s-6);
    }
    .contact-form .btn {
      margin-top: var(--s-2);
    }
    .form-sent {
      margin-top: var(--s-6);
      padding-top: var(--s-5);
      border-top: 1px solid var(--rule);
      font-family: var(--font-serif);
      font-size: var(--fs-body);
      color: var(--fg-2);
    }
    .form-sent em {
      font-family: var(--font-display);
      font-style: italic;
      color: var(--accent-deep);
    }
    .form-sent[hidden] { display: none; }
  </style>
</head>
<body>

<nav class="site-nav" aria-label="Primary">
  <div class="page">
    <a class="nav-brand" href="/" aria-label="Emma Hudelson — home">Emma Hudelson</a>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-controls="navLinks" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a class="nav-link" href="/about">About</a></li>
      <li><a class="nav-link" href="/books">Books</a></li>
      <li><a class="nav-link" href="/writing">Writing</a></li>
      <li><a class="nav-link" href="/wellness">Wellness</a></li>
      <li><a class="nav-link active" href="/contact">Contact</a></li>
    </ul>
  </div>
</nav>

<main>

  <section class="page-head reveal">
    <div class="page">
      <p class="eyebrow">Contact</p>
      <h1 class="page-title">Get in touch</h1>
    </div>
  </section>

  <section class="contact-body reveal">
    <form class="contact-form" id="contactForm"
          action="#"
          method="post">
      <div class="field">
        <label for="cf-name">Name</label>
        <input type="text" id="cf-name" name="name" required autocomplete="name">
      </div>
      <div class="field">
        <label for="cf-email">Email</label>
        <input type="email" id="cf-email" name="email" required
               placeholder="name@domain.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="cf-message">Message</label>
        <textarea id="cf-message" name="message" rows="5" required
                  placeholder="A note about a workshop, reading, press inquiry, or event…"></textarea>
      </div>
      <button class="btn" type="submit">Send</button>
    </form>

    <div class="form-sent" id="formSent" hidden>
      <p><em>Thank you.</em> Emma will be in touch soon.</p>
    </div>
  </section>

</main>

<footer class="site-footer" role="contentinfo">
  <div class="page">
    <div class="footer-col">
      <div class="asterism" aria-hidden="true"></div>
      <p class="footer-meta">&copy; 2026</p>
      <p class="footer-meta">social: <a href="https://www.instagram.com/efhudelson/" target="_blank" rel="noopener">@efhudelson</a></p>
    </div>

  </div>
</footer>

<script>
  (function () {
    var form = document.getElementById('contactForm');
    var sent = document.getElementById('formSent');
    if (!form || !sent) return;
    form.addEventListener('submit', function () {
      setTimeout(function () { sent.hidden = false; }, 0);
    });
  })();
</script>
<script src="/js/nav.js"></script>
</body>
</html>
