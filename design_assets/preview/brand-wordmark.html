<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:36px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;justify-content:center}
  .wm{font-family:var(--font-display);font-weight:400;line-height:1}
  .l1{font-size:52px;letter-spacing:-.015em;color:var(--ink);font-variation-settings:"opsz" 120}
  .l2{font-size:28px;color:var(--ink);font-variation-settings:"opsz" 72;font-style:italic}
  .l3{font-family:var(--font-sans);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
  hr{border:0;border-top:1px solid var(--ink);width:56px;margin:4px 0}
</style></head>
<body>
  <div class="wm l1">Emma Hudelson</div>
  <hr>
  <div class="wm l2">Nonfiction · Teaching</div>
  <div class="l3">Indianapolis</div>
</body></html>
