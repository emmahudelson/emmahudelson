<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:36px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .btn{font-family:var(--font-sans);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;padding:14px 24px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;transition:all 220ms cubic-bezier(.2,.6,.2,1)}
  .btn:hover{background:var(--ink);color:var(--paper)}
  .btn.solid{background:var(--ink);color:var(--paper)}
  .btn.solid:hover{background:var(--sage-deep);border-color:var(--sage-deep)}
  .btn.text{padding:0;border:0;background:transparent;color:var(--sage);text-transform:none;letter-spacing:.02em;font-family:var(--font-serif);font-size:16px;font-style:italic;border-bottom:1px solid var(--sage)}
  .btn.text:hover{color:var(--sage-deep);border-bottom-color:var(--sage-deep)}
</style></head>
<body>
  <button class="btn">Buy the book</button>
  <button class="btn solid">Book a workshop</button>
  <button class="btn text">→ read the excerpt</button>
</body></html>
