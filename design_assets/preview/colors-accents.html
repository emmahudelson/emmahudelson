<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:32px;background:var(--paper);height:100%;box-sizing:border-box}
  .row{display:flex;gap:28px;align-items:flex-end}
  .swatch{display:flex;flex-direction:column;gap:8px}
  .chip{width:110px;height:110px}
  .hex{font-family:var(--font-sans);font-size:11px;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase}
  .name{font-family:var(--font-serif);font-size:13px;color:var(--ink)}
  .role{font-family:var(--font-sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute)}
</style></head>
<body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#6B7A5A"></div><div class="role">Primary accent</div><div class="name">Sage</div><div class="hex">#6B7A5A</div></div>
  <div class="swatch"><div class="chip" style="background:#4C5A3F"></div><div class="role">Hover / active</div><div class="name">Sage Deep</div><div class="hex">#4C5A3F</div></div>
  <div class="swatch"><div class="chip" style="background:#7A2E28"></div><div class="role">Drop caps, marks</div><div class="name">Oxblood</div><div class="hex">#7A2E28</div></div>
  <div class="swatch"><div class="chip" style="background:#7E93A3"></div><div class="role">Sky Watch hero only</div><div class="name">Sky</div><div class="hex">#7E93A3</div></div>
</div>
</body></html>
