<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:28px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;align-items:center}
  .pull{font-family:var(--font-display);font-weight:300;font-size:26px;line-height:1.32;letter-spacing:-.006em;color:var(--ink);max-width:560px;font-style:italic}

  cite{display:block;margin-top:18px;font-family:var(--font-sans);font-style:normal;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
</style></head>
<body>
  <div>
    <p class="pull">A beautiful braided memoir deftly weaving the dramatic story of Saddlebred horses&rsquo; biggest star.&rdquo;</p>
    <cite>— Tessa Fontaine, author of <i style="text-transform:none;letter-spacing:0">The Electric Woman</i></cite>
  </div>
