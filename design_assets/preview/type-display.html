<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:36px 44px;background:var(--paper);height:100%;box-sizing:border-box}
  .specimen{font-family:var(--font-display);font-weight:400;font-size:88px;line-height:.96;letter-spacing:-.018em;color:var(--ink);font-variation-settings:"opsz" 144;margin:0}
  .label{font-family:var(--font-sans);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:14px}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--ink-soft);letter-spacing:.04em;margin-top:14px}
</style></head>
<body>
  <div class="label">Display — Fraunces</div>
  <div class="specimen">Sky Watch</div>
  <div class="meta">Fraunces · Regular 400 · opsz 144 · −1.8% tracking</div>
</body></html>
