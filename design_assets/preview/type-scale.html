<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:28px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;justify-content:center}
  .row{display:flex;align-items:baseline;gap:28px;border-bottom:1px solid var(--rule);padding-bottom:10px}
  .row:last-child{border:0}
  .tok{font-family:var(--font-sans);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-mute);width:110px}
  .spec{font-family:var(--font-display);font-weight:400;color:var(--ink);font-variation-settings:"opsz" 72;letter-spacing:-.01em}
  .xl{font-size:64px;line-height:1}
  .l{font-size:44px;line-height:1}
  .m{font-size:32px;line-height:1}
  .h2{font-size:24px;line-height:1;font-family:var(--font-display)}
  .body{font-family:var(--font-serif);font-size:18px;color:var(--ink-soft)}
</style></head>
<body>
  <div class="row"><div class="tok">Display XL</div><div class="spec xl">Sky Watch</div></div>
  <div class="row"><div class="tok">Display L</div><div class="spec l">Sky Watch</div></div>
  <div class="row"><div class="tok">Display M</div><div class="spec m">Sky Watch</div></div>
  <div class="row"><div class="tok">H2</div><div class="h2 spec">Chasing a saddlebred story</div></div>
  <div class="row"><div class="tok">Body 18</div><div class="body">The blue ribbon goes to the best entertainer in the ring.</div></div>
</body></html>
