<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:28px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;justify-content:center}
  .stk{display:flex;align-items:center;gap:18px}
  .box{background:var(--sage);height:24px}
  .lbl{font-family:var(--font-sans);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-mute);width:80px}
  .num{font-family:var(--font-sans);font-size:11px;color:var(--ink-soft)}
</style></head>
<body>
  <div class="stk"><div class="lbl">s-2 · 8</div><div class="box" style="width:8px"></div><div class="num">0.5rem</div></div>
  <div class="stk"><div class="lbl">s-4 · 16</div><div class="box" style="width:16px"></div><div class="num">1rem</div></div>
  <div class="stk"><div class="lbl">s-6 · 32</div><div class="box" style="width:32px"></div><div class="num">2rem</div></div>
  <div class="stk"><div class="lbl">s-7 · 48</div><div class="box" style="width:48px"></div><div class="num">3rem</div></div>
  <div class="stk"><div class="lbl">s-8 · 64</div><div class="box" style="width:64px"></div><div class="num">4rem</div></div>
  <div class="stk"><div class="lbl">s-10 · 128</div><div class="box" style="width:128px"></div><div class="num">8rem · section gap</div></div>
</body></html>
