<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 44px;border-bottom:1px solid var(--rule)}
  .brand{font-family:var(--font-display);font-size:22px;font-weight:400;letter-spacing:-.01em;color:var(--ink)}
  .links{display:flex;gap:28px}
  .links a{font-family:var(--font-sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;background:none;padding:0}
  .links a:hover{color:var(--sage-deep);background:none}
  .links a.active{color:var(--ink);border-bottom:1px solid var(--ink);padding-bottom:4px}
  footer{margin-top:auto;padding:22px 44px;border-top:1px solid var(--rule);display:flex;justify-content:space-between;font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
  footer a{background:none;color:var(--ink-mute);padding:0}
  footer a:hover{color:var(--ink);background:none}
</style></head>
<body>
  <nav>
    <div class="brand">Emma Hudelson</div>
    <div class="links">
      <a class="active" href="#">Sky Watch</a>
      <a href="#">Publications</a>
      <a href="#">Writing for Wellness</a>
      <a href="#">Bio</a>
      <a href="#">Contact</a>
    </div>
  </nav>
  <footer>
    <span>© 2026 Emma Hudelson</span>
    <span><a href="#">Instagram</a> &nbsp;·&nbsp; <a href="#">Facebook</a> &nbsp;·&nbsp; <a href="#">Email</a></span>
  </footer>
</body></html>
