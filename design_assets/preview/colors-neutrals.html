<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:32px;background:var(--paper);height:100%;box-sizing:border-box}
  .row{display:flex;gap:28px;align-items:flex-end}
  .swatch{display:flex;flex-direction:column;gap:8px}
  .chip{width:84px;height:84px;border:1px solid var(--rule)}
  .hex{font-family:var(--font-sans);font-size:11px;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase}
  .name{font-family:var(--font-serif);font-size:13px;color:var(--ink)}
</style></head>
<body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#F6F2EA"></div><div class="name">Paper</div><div class="hex">#F6F2EA</div></div>
  <div class="swatch"><div class="chip" style="background:#EFE8DB"></div><div class="name">Paper Alt</div><div class="hex">#EFE8DB</div></div>
  <div class="swatch"><div class="chip" style="background:#E7DEC9"></div><div class="name">Paper Deep</div><div class="hex">#E7DEC9</div></div>
  <div class="swatch"><div class="chip" style="background:#D9D1C2"></div><div class="name">Rule</div><div class="hex">#D9D1C2</div></div>
  <div class="swatch"><div class="chip" style="background:#8A857C"></div><div class="name">Ink Mute</div><div class="hex">#8A857C</div></div>
  <div class="swatch"><div class="chip" style="background:#3C3A36"></div><div class="name">Ink Soft</div><div class="hex">#3C3A36</div></div>
  <div class="swatch"><div class="chip" style="background:#1A1A1A"></div><div class="name">Ink</div><div class="hex">#1A1A1A</div></div>
</div>
</body></html>
