<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:28px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:20px;justify-content:center}
  hr{border:0;border-top:1px solid var(--rule);margin:0}
  .short{width:48px;border-top:1px solid var(--ink);margin:0}
  .ast{text-align:center;color:var(--ink-mute);letter-spacing:.6em;font-family:var(--font-display);font-size:15px}
  .lbl{font-family:var(--font-sans);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-mute)}
  .row{display:flex;flex-direction:column;gap:8px}
</style></head>
<body>
  <div class="row"><div class="lbl">Hairline rule</div><hr></div>
  <div class="row"><div class="lbl">Section break — short</div><hr class="short"></div>
  <div class="row"><div class="lbl">Asterism ornament</div><div class="ast">⁂</div></div>
</body></html>
