<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:32px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;justify-content:center}
  .eyebrow{font-family:var(--font-sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
  .eyebrow.accent{color:var(--sage)}
  .caption{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--ink-mute)}
  .meta-ink{font-family:var(--font-sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);font-weight:500}
  .sep{height:1px;background:var(--rule);width:100%}
</style></head>
<body>
  <div class="eyebrow">Praise for Sky Watch</div>
  <div class="eyebrow accent">Writing for Wellness · Workshops</div>
  <div class="meta-ink">Published April 2024 — University Press of Kentucky</div>
  <div class="caption">Photo by Jane Jacobs · Illinois State Fairgrounds, 2023</div>
  <div class="sep"></div>
</body></html>
