<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:32px 44px;background:var(--paper);height:100%;box-sizing:border-box;display:flex;align-items:center;gap:36px}
  img{width:140px;height:auto;display:block;box-shadow:0 1px 0 rgba(0,0,0,.08)}
  .meta .eye{font-family:var(--font-sans);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:10px}
  .meta .ti{font-family:var(--font-display);font-size:34px;line-height:1.05;color:var(--ink);font-style:italic;font-weight:400;font-variation-settings:"opsz" 72;letter-spacing:-.01em;margin-bottom:6px}
  .meta .sub{font-family:var(--font-serif);font-size:16px;color:var(--ink-soft)}
</style></head>
<body>
  <img src="../assets/sky-watch-cover.jpg" alt="Sky Watch cover">
  <div class="meta">
    <div class="eye">The book</div>
    <div class="ti">Sky Watch</div>
    <div class="sub">Chasing an American Saddlebred Story<br>University Press of Kentucky, 2024</div>
  </div>
</body></html>
