<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Shared <head> boilerplate for emmahudelson.com
    ------------------------------------------------------------------
    Each page pastes this immediately after <!DOCTYPE html> + <html>.
    Pages are responsible for adding:
      - <title>Page Title — Emma Hudelson</title>
      - <meta name="description" content="...">
      - <link rel="canonical" href="https://emmahudelson.com/...">
      - any page-specific <style> block (inside page <head>, AFTER site.css)
  -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">

  <!-- Fonts loaded via @import in /css/tokens.css: Manrope (display) + Public Sans (body) + DM Mono (labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Stylesheets: tokens FIRST (defines custom props), then shared components -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/site.css">

  <!-- PAGE: insert <title>, <meta name="description">, and page-specific <style> below -->
  <title>Emma Hudelson</title>
  <meta name="description" content="Emma Hudelson — literary nonfiction writer. Author of Sky Watch: Chasing an American Saddlebred Story.">
  <link rel="canonical" href="https://emmahudelson.com/">

  <style>
    /* =========================================================================
       HOMEPAGE — editorial split
       Left: wordmark, stacked with an intentional line break between
             "Emma" and "Hudelson"; quiet small-caps meta anchored below.
       Right: atmospheric hero, full-bleed to viewport edge, warm duotone.
       Mostly negative space. The wordmark IS the design.
       ========================================================================= */

    /* Make the homepage fill the viewport beneath the sticky nav, no footer
       pushed up the fold. We use a grid the height of (100svh - nav) so the
       composition breathes without overflowing. */
    .home {
      min-height: calc(100svh - var(--nav-h));
      display: grid;
      /* Slightly left-weighted so the wordmark has room to stretch */
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
      align-items: stretch;
      border-bottom: 1px solid var(--rule);
    }

    /* ---------- Left: the wordmark panel ---------- */
    .home-type {
      position: relative;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(var(--s-7), 8vw, var(--s-10))
               clamp(var(--s-5), 4vw, var(--s-8))
               clamp(var(--s-6), 5vw, var(--s-8))
               var(--page-gutter);
      /* hairline separator between panels */
      border-right: 1px solid var(--rule);
    }

    /* Wordmark sits vertically centered in the upper region, left-aligned */
    .home-wordmark-wrap {
      display: flex;
      align-items: center;
    }

    /* Homepage-specific wordmark: override only line-break behavior
       and optical tuning — the `.wordmark` class in site.css handles
       the responsive type scale and variable-font axes. */
    .home-wordmark {
      /* force an intentional stacked break between given + surname on desktop */
      display: block;
      max-width: 14ch;
    }
    .home-wordmark .break { display: block; }

    /* Hand-tuned tracking for sans display at hero scale */
    @media (min-width: 1200px) {
      .home-wordmark {
        letter-spacing: -0.035em;
      }
    }

    /* ---------- Left: corner meta ---------- */
    .home-meta {
      align-self: end;
      display: flex;
      align-items: baseline;
      gap: 0.9em;
      font-family: var(--font-sans);
      font-size: var(--fs-meta);
      font-weight: 500;
      letter-spacing: var(--tr-label);
      text-transform: uppercase;
      color: var(--fg-mute);
      line-height: 1;
      margin: 0;
    }
    .home-meta .dot {
      /* typographic separator — middle dot, not icon */
      color: var(--rule);
      font-size: 0.9em;
      transform: translateY(-0.05em);
    }

    /* ---------- Right: the image panel ---------- */
    .home-image {
      position: relative;
      overflow: hidden;
      margin: 0;
      /* warm paper behind the image so the duotone settles into the palette */
      background: var(--paper-deep);
    }

    .home-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 60% center; /* favor the horse / motion, not dead center */
      /* Warm duotone: B&W + slight sepia. Subtle. */
      filter: grayscale(1) contrast(1.04) sepia(0.18) brightness(0.98);
      /* Paper-toned blend softens pure blacks into the cream field */
      mix-blend-mode: multiply;
    }

    /* A subtle paper wash to tie the image into the page's warmth */
    .home-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--paper);
      mix-blend-mode: soft-light;
      opacity: 0.35;
      pointer-events: none;
    }

    /* Vertical hairline caption on the image — editorial signature.
       Sits in the right-bottom of the image panel, rotated. */
    .home-image-caption {
      position: absolute;
      right: clamp(var(--s-4), 2vw, var(--s-5));
      bottom: clamp(var(--s-6), 5vw, var(--s-8));
      font-family: var(--font-sans);
      font-size: 0.6875rem; /* 11px */
      font-weight: 500;
      letter-spacing: var(--tr-label);
      text-transform: uppercase;
      color: var(--paper);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      opacity: 0.85;
      pointer-events: none;
      margin: 0;
    }

    /* ---------- Reveal choreography ---------- */
    /* Wordmark and meta come in on load; the image fades a beat later. */
    .home-wordmark,
    .home-meta,
    .home-image {
      opacity: 0;
      animation: homeFade var(--dur-slow) var(--ease) forwards;
    }
    .home-wordmark { animation-delay: 80ms; }
    .home-meta     { animation-delay: 360ms; }
    .home-image    { animation-delay: 240ms; }

    @keyframes homeFade {
      to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .home-wordmark,
      .home-meta,
      .home-image {
        opacity: 1;
        animation: none;
      }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 900px) {
      .home {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        min-height: 0;
      }
      .home-type {
        border-right: 0;
        border-bottom: 1px solid var(--rule);
        padding: clamp(var(--s-7), 10vw, var(--s-9))
                 var(--page-gutter)
                 clamp(var(--s-5), 6vw, var(--s-7))
                 var(--page-gutter);
        grid-template-rows: auto auto;
        gap: clamp(var(--s-6), 10vw, var(--s-8));
      }
      .home-wordmark {
        max-width: none;
      }
      .home-image {
        aspect-ratio: 4 / 5;
      }
      .home-image-caption {
        right: var(--s-4);
        bottom: var(--s-5);
      }
    }

    @media (max-width: 520px) {
      .home-type {
        padding-top: clamp(var(--s-6), 12vw, var(--s-8));
      }
      .home-meta {
        font-size: 0.6875rem;
        gap: 0.7em;
      }
      .home-image { aspect-ratio: 3 / 4; }
    }
  </style>
</head>
<body>
  <!--
    Shared site nav for emmahudelson.com
    ------------------------------------------------------------------
    Paste as-is into each page. Then add `class="nav-link active"` to
    the <a> matching that page. The wordmark link always points to `/`.

    Markup contract with /js/nav.js (do not change these ids/classes):
      - button#navToggle   (mobile hamburger)
      - ul#navLinks        (nav list; .open toggled at max-width: 900px)
  -->
  <nav class="site-nav" aria-label="Primary">
    <div class="page">
      <a class="nav-brand" href="/" aria-label="Emma Hudelson — home">Emma Hudelson</a>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-controls="navLinks" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a class="nav-link" href="/about">About</a></li>
        <li><a class="nav-link" href="/books">Books</a></li>
        <li><a class="nav-link" href="/writing">Writing</a></li>
        <li><a class="nav-link" href="/press">Press</a></li>
        <li><a class="nav-link" href="/wellness">Wellness</a></li>
        <li><a class="nav-link" href="/events">Events</a></li>
        <li><a class="nav-link" href="/contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="home" aria-labelledby="home-wordmark">
      <div class="home-type">
        <div class="home-wordmark-wrap">
          <h1 id="home-wordmark" class="wordmark home-wordmark">Emma<span class="break"> </span>Hudelson</h1>
        </div>

        <p class="home-meta" aria-label="Emma Hudelson — literary nonfiction writer based between Indianapolis and Kentucky">
          <span>Literary nonfiction</span>
          <span class="dot" aria-hidden="true">&middot;</span>
          <span>Indianapolis</span>
          <span class="dot" aria-hidden="true">&middot;</span>
          <span>Kentucky</span>
        </p>
      </div>

      <figure class="home-image" role="img" aria-label="A quiet moment inside an American Saddlebred show arena.">
        <img src="/assets/images/saddlebred-arena.jpg" alt="" loading="eager" fetchpriority="high" decoding="async">
      </figure>
    </section>
  </main>

  <script src="/js/nav.js"></script>
</body>
</html>
