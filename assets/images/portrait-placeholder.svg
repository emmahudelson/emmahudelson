<svg viewBox="0 0 480 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="480" height="600" fill="#ede7d9"/>
  <!-- Subtle warm gradient -->
  <radialGradient id="warmlight" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="rgba(255,248,235,0.6)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>
  <rect width="480" height="600" fill="url(#warmlight)"/>

  <!-- Photo frame hint -->
  <rect x="1" y="1" width="478" height="598" stroke="rgba(60,45,30,0.1)" stroke-width="1" fill="none"/>

  <!-- Abstract figure suggestion -->
  <!-- Head shape -->
  <ellipse cx="240" cy="200" rx="72" ry="85" fill="rgba(107,95,78,0.12)"/>
  <!-- Shoulder/torso hint -->
  <path d="M 120 420 Q 240 320 360 420 L 360 600 L 120 600 Z" fill="rgba(107,95,78,0.08)"/>
  <!-- Neck -->
  <rect x="218" y="278" width="44" height="50" fill="rgba(107,95,78,0.1)"/>

  <!-- Monogram overlay -->
  <text x="240" y="520" font-family="Georgia,serif" font-size="90" font-weight="300"
        fill="rgba(60,45,30,0.06)" text-anchor="middle" letter-spacing="10">EH</text>

  <!-- Decorative corner brackets -->
  <path d="M 30 30 L 30 60 M 30 30 L 60 30" stroke="rgba(184,146,42,0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 450 30 L 450 60 M 450 30 L 420 30" stroke="rgba(184,146,42,0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 30 570 L 30 540 M 30 570 L 60 570" stroke="rgba(184,146,42,0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 450 570 L 450 540 M 450 570 L 420 570" stroke="rgba(184,146,42,0.4)" stroke-width="1.5" fill="none"/>

  <!-- Caption area -->
  <text x="240" y="585" font-family="Georgia,serif" font-size="9" font-style="italic"
        fill="rgba(60,45,30,0.2)" text-anchor="middle" letter-spacing="3">Emma Hudelson</text>
</svg>
