<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Atmospheric background -->
  <rect width="800" height="600" fill="#ede7d9"/>
  <ellipse cx="600" cy="200" rx="320" ry="240" fill="rgba(122,74,46,0.07)"/>
  <ellipse cx="200" cy="450" rx="260" ry="180" fill="rgba(61,82,64,0.06)"/>
  <ellipse cx="680" cy="520" rx="200" ry="150" fill="rgba(184,146,42,0.05)"/>

  <!-- Ruled lines -->
  <line x1="80" y1="80" x2="720" y2="80" stroke="rgba(60,45,30,0.07)" stroke-width="1"/>
  <line x1="80" y1="96" x2="720" y2="96" stroke="rgba(60,45,30,0.07)" stroke-width="1"/>
  <line x1="80" y1="112" x2="720" y2="112" stroke="rgba(60,45,30,0.05)" stroke-width="1"/>

  <!-- Large ghosted letterform -->
  <text x="40" y="500" font-family="Georgia,serif" font-size="600" font-weight="300"
        fill="rgba(60,45,30,0.035)" letter-spacing="-30">E</text>

  <!-- Vertical gold rule -->
  <line x1="60" y1="140" x2="60" y2="560" stroke="rgba(184,146,42,0.4)" stroke-width="1.5"/>
  <circle cx="60" cy="140" r="3.5" fill="none" stroke="rgba(184,146,42,0.55)" stroke-width="1"/>
  <circle cx="60" cy="560" r="3.5" fill="none" stroke="rgba(184,146,42,0.55)" stroke-width="1"/>

  <!-- Abstract horse motion strokes -->
  <path d="M 380 340 C 410 295 480 255 530 220 C 580 185 630 165 660 130"
        stroke="rgba(122,74,46,0.22)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 360 360 C 395 308 465 270 510 235 C 558 198 610 178 640 148"
        stroke="rgba(122,74,46,0.13)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 400 320 C 425 285 490 248 542 208"
        stroke="rgba(122,74,46,0.08)" stroke-width="1" stroke-linecap="round"/>

  <!-- Decorative corner marks -->
  <path d="M 720 80 L 760 80 L 760 120" stroke="rgba(184,146,42,0.3)" stroke-width="1" fill="none"/>
  <path d="M 40 520 L 40 560 L 80 560" stroke="rgba(184,146,42,0.3)" stroke-width="1" fill="none"/>

  <!-- Caption text -->
  <text x="80" y="585" font-family="Georgia,serif" font-size="11" font-style="italic"
        fill="rgba(60,45,30,0.28)" letter-spacing="2">animals · women · memory</text>

  <!-- Sky Watch watermark -->
  <text x="400" y="420" font-family="Georgia,serif" font-size="72" font-weight="300"
        fill="rgba(60,45,30,0.04)" text-anchor="middle" letter-spacing="8">SKY WATCH</text>
</svg>
